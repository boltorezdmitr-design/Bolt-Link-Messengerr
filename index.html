<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bolt Link</title>
    <style>
        /* Центрирование входа */
        #auth-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        
        /* Основной интерфейс */
        #app-ui { display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #333; color: white; padding: 20px; }
        #main-content { flex-grow: 1; padding: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <h2>Bolt Link</h2>
        <input type="text" id="username" placeholder="Username (для регистрации)"><br>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="pass" placeholder="Пароль"><br>
        <button onclick="handleAuth('register')">Регистрация</button>
        <button onclick="handleAuth('login')">Вход</button>
    </div>

    <div id="app-ui" class="hidden">
        <div id="sidebar">
            <button onclick="showProfile()">Профиль</button><br><br>
            <button onclick="toggleTheme()">Сменить тему</button><br><br>
            <button onclick="location.reload()">Выйти</button>
        </div>
        
        <div id="main-content">
            <div style="text-align: center;">
                <input type="text" id="search-input" placeholder="Поиск...">
                <button onclick="searchUser()">🔍</button>
            </div>
            <div id="results"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBw3881Qf3QqPzoC6RXX7dTVa3boftkoR8",
  authDomain: "massanger-6da0b.firebaseapp.com",
  projectId: "massanger-6da0b",
  storageBucket: "massanger-6da0b.firebasestorage.app",
  messagingSenderId: "799439844084",
  appId: "1:799439844084:web:f5cdea552fc8eb37ab24a1",
  measurementId: "G-KH4KZ9RQ6H"
 };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getDatabase();

        window.handleAuth = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const nick = document.getElementById('username').value;
            
            try {
                if (type === 'register') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, 'users/' + res.user.uid), { email, username: nick });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
                document.getElementById('auth-ui').classList.add('hidden');
                document.getElementById('app-ui').classList.remove('hidden');
            } catch (e) { alert(e.message); }
        };

        window.toggleTheme = () => {
            document.body.style.backgroundColor = document.body.style.backgroundColor === 'black' ? 'white' : 'black';
        };
    </script>
</body>
</html>
