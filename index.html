<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мессенджер</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; background: #f0f2f5; }
        #sidebar { width: 300px; background: #2c3e50; color: white; padding: 20px; display: none; }
        #main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #3498db; color: white; border: none; cursor: pointer; }
        #profile-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; margin: 0 auto 10px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <img id="profile-img" src="">
        <p id="display-nick">Ник: ...</p>
        <input type="file" id="avatar-input" accept="image/*">
        <button onclick="uploadAvatar()">Загрузить фото</button>
        <hr>
        <input type="text" id="new-nick" placeholder="Новый ник">
        <button onclick="updateProfile()">Сменить ник</button>
        <button onclick="showDeleteConfirm()" style="background: #e74c3c; margin-top: 20px;">Удалить аккаунт</button>
        <div id="delete-confirm-box" style="display: none; background: #c0392b; padding: 10px; margin-top: 10px;">
            <button onclick="deleteAccount()" style="background: #c0392b; border: 1px solid white;">Подтвердить удаление</button>
        </div>
        <button onclick="logout()" style="background: #7f8c8d; margin-top: 10px;">Выйти</button>
    </div>

    <div id="main-content">
        <div id="auth-screen" class="box">
            <h3>Вход / Регистрация</h3>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <button onclick="register()">Регистрация</button>
            <button onclick="login()" style="margin-top: 10px;">Войти</button>
        </div>

        <div id="home-screen" class="box" style="display: none;">
            <input type="text" id="search-input" placeholder="Введите username...">
            <button onclick="searchUser()">Найти</button>
            <div id="search-results"></div>
            <h3>Ваши чаты</h3>
            <div id="conversations-list"></div>
        </div>

        <div id="chat-screen" class="box" style="display: none;">
            <button onclick="location.reload()">Назад</button>
            <div id="chat-area" style="height: 250px; overflow-y: auto; border: 1px solid #ccc; padding: 10px;"></div>
            <input id="msg-input" placeholder="Сообщение...">
            <button onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword, deleteUser, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getDatabase, ref, set, update, get, onValue, push, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

        const firebaseConfig = { apiKey: "AIzaSyBw3881Qf3QqPzoC6RXX7dTVa3boftkoR8",
  authDomain: "massanger-6da0b.firebaseapp.com",
  projectId: "massanger-6da0b",
  storageBucket: "massanger-6da0b.firebasestorage.app",
  messagingSenderId: "799439844084",
  appId: "1:799439844084:web:f5cdea552fc8eb37ab24a1",
  measurementId: "G-KH4KZ9RQ6H" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);
        let currentTargetUid = null;

        window.register = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = prompt("Username:");
            if(!email || !password || !username) return;
            const res = await createUserWithEmailAndPassword(auth, email, password);
            await set(ref(db, 'users/' + res.user.uid), { username, nickname: email.split('@')[0] });
            alert("Успешно!");
        };

        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert(e.message));
        window.logout = () => signOut(auth).then(() => location.reload());

        window.uploadAvatar = async () => {
            const file = document.getElementById('avatar-input').files[0];
            const fileRef = storageRef(storage, 'avatars/' + auth.currentUser.uid);
            await uploadBytes(fileRef, file);
            const url = await getDownloadURL(fileRef);
            await update(ref(db, 'users/' + auth.currentUser.uid), { avatar: url });
            document.getElementById('profile-img').src = url;
            document.getElementById('profile-img').style.display = 'block';
        };

        window.updateProfile = () => {
            const nick = document.getElementById('new-nick').value;
            if (nick) update(ref(db, 'users/' + auth.currentUser.uid), { nickname: nick }).then(() => {
                document.getElementById('display-nick').innerText = "Ник: " + nick;
                alert("Ник изменен!");
            });
        };

        window.showDeleteConfirm = () => document.getElementById('delete-confirm-box').style.display = 'block';
        
        window.deleteAccount = async () => {
            const password = prompt("Для подтверждения удаления введите ваш пароль:");
            if (!password) return;
            try {
                const user = auth.currentUser;
                const credential = EmailAuthProvider.credential(user.email, password);
                await reauthenticateWithCredential(user, credential);
                
                await remove(ref(db, 'users/' + user.uid));
                await remove(ref(db, 'user_chats/' + user.uid));
                await deleteUser(user);
                
                alert("Аккаунт полностью удален.");
                window.location.reload();
            } catch (e) { alert("Ошибка: " + e.message + ". Пароль неверный или сессия устарела."); }
        };

        window.searchUser = () => {
            const query = document.getElementById('search-input').value;
            get(ref(db, 'users/')).then(snap => {
                document.getElementById('search-results').innerHTML = "";
                snap.forEach(c => {
                    if (c.val().username === query && c.key !== auth.currentUser.uid) {
                        document.getElementById('search-results').innerHTML = `<p>Найдено: ${c.val().username} <button onclick="openChat('${c.key}')">Написать</button></p>`;
                    }
                });
            });
        };

        window.openChat = (uid) => {
            currentTargetUid = uid;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'block';
            set(ref(db, `user_chats/${auth.currentUser.uid}/${uid}`), { active: true });
            
            const chatId = [auth.currentUser.uid, uid].sort().join('_');
            onValue(ref(db, `messages/${chatId}`), (snap) => {
                const area = document.getElementById("chat-area");
                area.innerHTML = "";
                snap.forEach(m => area.innerHTML += `<p><b>${m.val().sender === auth.currentUser.uid ? 'Вы' : 'Он'}:</b> ${m.val().text}</p>`);
            });
        };

        window.sendMessage = () => {
            const text = document.getElementById("msg-input").value;
            push(ref(db, `messages/${[auth.currentUser.uid, currentTargetUid].sort().join('_')}`), { sender: auth.currentUser.uid, text });
            document.getElementById("msg-input").value = "";
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('home-screen').style.display = 'block';
                document.getElementById('sidebar').style.display = 'block';
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    if(!snap.exists()) return;
                    const data = snap.val();
                    document.getElementById('display-nick').innerText = "Ник: " + data.nickname;
                    if (data.avatar) {
                        document.getElementById('profile-img').src = data.avatar;
                        document.getElementById('profile-img').style.display = 'block';
                    }
                });
            }
        });
    </script>
</body>
</html>
