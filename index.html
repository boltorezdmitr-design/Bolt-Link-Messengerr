<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bolt Link</title>
</head>
<body>
    <div id="auth-ui">
        <h2>Вход в Bolt Link</h2>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="pass" placeholder="Пароль"><br>
        <button onclick="authAction('login')">Войти</button>
        <button onclick="authAction('register')">Регистрация</button>
    </div>

    <div id="app-ui" style="display:none;">
        <h2>Bolt Link</h2>
        <button onclick="deleteAccount()" style="color:red;">Удалить аккаунт</button>
        <button onclick="location.reload()">Выйти</button>
        <h3>Все пользователи:</h3>
        <div id="user-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, deleteUser } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw3881Qf3QqPzoC6RXX7dTVa3boftkoR8",
  authDomain: "massanger-6da0b.firebaseapp.com",
  projectId: "massanger-6da0b",
  storageBucket: "massanger-6da0b.firebasestorage.app",
  messagingSenderId: "799439844084",
  appId: "1:799439844084:web:f5cdea552fc8eb37ab24a1",
  measurementId: "G-KH4KZ9RQ6H"

        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getDatabase();

        window.authAction = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                if (type === 'register') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, 'users/' + res.user.uid), { email: email });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('app-ui').style.display = 'block';
                loadUsers();
            } catch (e) { alert(e.message); }
        };

        function loadUsers() {
            onValue(ref(db, 'users/'), (snap) => {
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                snap.forEach(c => { list.innerHTML += `<div>${c.val().email}</div>`; });
            });
        }

        window.deleteAccount = async () => {
            const user = auth.currentUser;
            if (user) {
                try {
                    await remove(ref(db, 'users/' + user.uid));
                    await deleteUser(user);
                    alert("Удалено");
                    location.reload();
                } catch (e) { alert("Ошибка: " + e.message); }
            }
        };
    </script>
</body>
</html>
