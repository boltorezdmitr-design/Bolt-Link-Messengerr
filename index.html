<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bolt Link</title>
    <style>
        body { font-family: sans-serif; height: 100vh; margin: 0; }
        .screen { display: none; padding: 20px; }
        .active { display: block !important; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen active">
        <h2>Вход</h2>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="pass" placeholder="Пароль"><br>
        <button onclick="login()">Войти</button>
    </div>

    <div id="main-screen" class="screen">
        <button onclick="showScreen('profile-screen')">Профиль</button>
        <button onclick="location.reload()">Выйти</button>
        <h1>Главная</h1>
    </div>

    <div id="profile-screen" class="screen">
        <h1>Профиль</h1>
        <button onclick="showScreen('main-screen')">Назад</button>
        <button onclick="deleteAccount()" style="color:red;">УДАЛИТЬ АККАУНТ</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, deleteUser, reauthenticateWithCredential, EmailAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyBw3881Qf3QqPzoC6RXX7dTVa3boftkoR8",
  authDomain: "massanger-6da0b.firebaseapp.com",
  projectId: "massanger-6da0b",
  storageBucket: "massanger-6da0b.firebasestorage.app",
  messagingSenderId: "799439844084",
  appId: "1:799439844084:web:f5cdea552fc8eb37ab24a1",
  measurementId: "G-KH4KZ9RQ6H" };
        initializeApp(firebaseConfig);
        const auth = getAuth();

        // Функция переключения
        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // Вход
        window.login = async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
                showScreen('main-screen');
            } catch(e) { alert(e.message); }
        };

        // Удаление
        window.deleteAccount = async () => {
            const p = prompt("Введите пароль для удаления:");
            if (!p) return;
            try {
                const cred = EmailAuthProvider.credential(auth.currentUser.email, p);
                await reauthenticateWithCredential(auth.currentUser, cred);
                await deleteUser(auth.currentUser);
                alert("Аккаунт удален");
                location.reload();
            } catch(e) { alert(e.message); }
        };
    </script>
</body>
</html>
