<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Bolt Link</title>
    <style>
        body { margin: 0; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        #auth-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }
        #app-ui { display: none; display: flex; height: 100%; width: 100%; }
        
        #sidebar { width: 250px; background: #333; color: white; padding: 20px; }
        #main-content { flex-grow: 1; padding: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-ui">
        <h2>Bolt Link - Вход</h2>
        <input type="text" id="username" placeholder="Username"><br>
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="pass" placeholder="Пароль"><br>
        <button onclick="authAction('register')">Регистрация</button>
        <button onclick="authAction('login')">Вход</button>
    </div>

    <div id="app-ui">
        <div id="sidebar">
            <button>Профиль</button><br><br>
            <button onclick="toggleTheme()">Тема</button><br><br>
            <button onclick="location.reload()">Выйти</button>
        </div>
        <div id="main-content">
            <div style="display:flex; justify-content:center;">
                <input type="text" id="search-input" placeholder="Поиск пользователей...">
                <button>🔍</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw3881Qf3QqPzoC6RXX7dTVa3boftkoR8",
  authDomain: "massanger-6da0b.firebaseapp.com",
  projectId: "massanger-6da0b",
  storageBucket: "massanger-6da0b.firebasestorage.app",
  messagingSenderId: "799439844084",
  appId: "1:799439844084:web:f5cdea552fc8eb37ab24a1",
  measurementId: "G-KH4KZ9RQ6H"

        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getDatabase();

        window.authAction = async (type) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const nick = document.getElementById('username').value;
            
            try {
                if (type === 'register') {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, 'users/' + res.user.uid), { email, username: nick });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
                // Переход к интерфейсу
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('app-ui').style.display = 'flex';
            } catch (e) {
                console.error("Ошибка Firebase:", e);
                alert("Ошибка: " + e.message);
            }
        };

        window.toggleTheme = () => {
            document.body.style.backgroundColor = document.body.style.backgroundColor === 'black' ? 'white' : 'black';
        };
    </script>
</body>
</html>
