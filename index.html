<!DOCTYPE html>
<html>
<head>
    <title>Bolt Link</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>Bolt Link Messenger</h1>
    
    <div id="auth-section">
        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="pass" placeholder="Пароль"><br>
        <button onclick="login()">Войти</button>
        <button onclick="register()">Регистрация</button>
    </div>

    <div id="app-section" class="hidden">
        <button onclick="logout()">Выйти</button>
        <button onclick="deleteMyAccount()" style="color: red;">Удалить аккаунт</button>
        <h3>Пользователи онлайн:</h3>
        <div id="user-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, deleteUser } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBw3881Qf3QqPzoC6RXX7dTVa3boftkoR8",
  authDomain: "massanger-6da0b.firebaseapp.com",
  projectId: "massanger-6da0b",
  storageBucket: "massanger-6da0b.firebasestorage.app",
  messagingSenderId: "799439844084",
  appId: "1:799439844084:web:f5cdea552fc8eb37ab24a1",
  measurementId: "G-KH4KZ9RQ6H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getDatabase();

        window.register = () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value)
            .then(userCredential => {
                set(ref(db, 'users/' + userCredential.user.uid), { email: userCredential.user.email });
                alert("Регистрация успешна!");
            }).catch(e => alert(e.message));
        };

        window.login = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value)
            .then(() => {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                loadUsers();
            }).catch(e => alert(e.message));
        };

        window.logout = () => { signOut(auth).then(() => location.reload()); };

        function loadUsers() {
            onValue(ref(db, 'users/'), (snapshot) => {
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                snapshot.forEach(child => {
                    list.innerHTML += `<div>📧 ${child.val().email}</div>`;
                });
            });
        }

        window.deleteMyAccount = async () => {
            const user = auth.currentUser;
            if (user && confirm("Точно удалить?")) {
                try {
                    await remove(ref(db, 'users/' + user.uid));
                    await deleteUser(user);
                    location.reload();
                } catch (e) { alert(e.message); }
            }
        };
    </script>
</body>
</html>
